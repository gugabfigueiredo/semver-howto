name: test-semver

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  semver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: resolve version
        id: semver
        uses: ./

      - name: result
        run: echo "proposed=${{ steps.semver.outputs.version }}"
